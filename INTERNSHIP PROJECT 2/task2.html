<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Animated Calculator</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .calculator {
            backdrop-filter: blur(15px) saturate(160%);
            background: rgba(30, 30, 30, 0.8);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .display {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-around;
            padding: 15px;
            margin-bottom: 10px;
            min-height: 80px;
            word-wrap: break-word;
            word-break: break-all;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        #previous-operand { color: rgba(255,255,255,0.6); font-size: 0.9rem; min-height: 1rem; }
        #current-operand { color: #fff; font-size: 1.8rem; font-weight: bold; }

        button {
            height: 65px;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            background: #444;
            position: relative;
            box-shadow: 0 6px 0 #222;
            transition: all 0.1s ease;
            outline: none;
        }

        button:hover { background: #555; transform: translateY(-2px); box-shadow: 0 8px 0 #222; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #222; }

        .plus { background: #4caf50 !important; box-shadow: 0 6px 0 #2e6b31 !important; }
        .minus { background: #f44336 !important; box-shadow: 0 6px 0 #8a261f !important; }
        .multiply { background: #2196f3 !important; box-shadow: 0 6px 0 #125488 !important; }
        .divide { background: #ff9800 !important; box-shadow: 0 6px 0 #a36100 !important; }

        .equals { background: #4caf50; box-shadow: 0 6px 0 #2e6b31; grid-column: span 2; }
        .control { background: #888; color: #111; box-shadow: 0 6px 0 #555; }
        .span-two { grid-column: span 2; }

        .pop { animation: pop-text 0.15s ease-out; }
        @keyframes pop-text {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
    
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="previous-operand"></div>
            <div id="current-operand">0</div>
        </div>
        
        <button class="span-two control" onclick="clearDisplay()">AC</button>
        <button class="control" onclick="deleteNumber()">DEL</button>
        <button class="operator divide" data-key="/" onclick="chooseOperator('÷')">÷</button>
        
        <button data-key="7" onclick="appendNumber('7')">7</button>
        <button data-key="8" onclick="appendNumber('8')">8</button>
        <button data-key="9" onclick="appendNumber('9')">9</button>
        <button class="operator multiply" data-key="*" onclick="chooseOperator('×')">×</button>
        
        <button data-key="4" onclick="appendNumber('4')">4</button>
        <button data-key="5" onclick="appendNumber('5')">5</button>
        <button data-key="6" onclick="appendNumber('6')">6</button>
        <button class="operator minus" data-key="-" onclick="chooseOperator('-')">−</button>
        
        <button data-key="1" onclick="appendNumber('1')">1</button>
        <button data-key="2" onclick="appendNumber('2')">2</button>
        <button data-key="3" onclick="appendNumber('3')">3</button>
        <button class="operator plus" data-key="+" onclick="chooseOperator('+')">+</button>
        
        <button data-key="." onclick="appendNumber('.')">.</button>
        <button data-key="0" onclick="appendNumber('0')">0</button>
        <button class="equals" data-key="Enter" onclick="compute()">=</button>
    </div>
    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;

        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            previousDisplay.innerText = operator ? `${previousInput} ${operator}` : '';

            // Refresh animation
            currentDisplay.classList.remove('pop');
            void currentDisplay.offsetWidth;
            currentDisplay.classList.add('pop');
        }

        function appendNumber(number) {
            if (number === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function chooseOperator(op) {
            if (currentInput === '' && previousInput === '') return;
            if (currentInput === '' && previousInput !== '') {
                operator = op;
            updateDisplay();
            return;
            }
            if (previousInput !== '') compute();
            operator = op;
            previousInput = currentInput;
            currentInput = '';
            updateDisplay();
        }

        function compute() {
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '×': result = prev * current; break;
                case '÷': 
                result = current === 0 ? "Error" : prev / current; 
                break;
                default: return;
            }

            currentInput = result.toString();
            operator = null;
            previousInput = '';
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentInput === '0') return;
            currentInput = currentInput.toString().slice(0, -1) || '0';
            updateDisplay();
        }

        window.addEventListener('keydown', e => {
            let key = e.key;
            if (key === '*') key = '*';
            if (key === '/') key = '/';

        const btn = document.querySelector(`button[data-key="${key}"]`) || 
            Array.from(document.querySelectorAll('button')).find(b => b.innerText === key);

            if (btn) {
                btn.click();
                btn.style.transform = "translateY(4px)";
                btn.style.boxShadow = "0 2px 0 #222";
                setTimeout(() => {
                    btn.style.transform = "";
                    btn.style.boxShadow = "";
                }, 100);
            }

        if (key === 'Backspace') deleteNumber();
        if (key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
